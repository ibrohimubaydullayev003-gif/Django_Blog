{% extends 'base.html' %}

{% block title %}Saytga kirish{% endblock title %}

{% block content %}
<div style="max-width: 420px; margin: 50px auto; padding: 30px; background-color: #ffffff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    
    <h2 style="text-align: center; color: #1a1a1a; margin-bottom: 25px; font-size: 26px; font-weight: 600;">Saytga kirish</h2>
    
    <form method="post" style="display: flex; flex-direction: column; gap: 16px;">
        {% csrf_token %}
        
        <div class="custom-django-form" style="color: #4a4a4a; font-size: 15px;">
            {{ form.as_p }}
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 10px;">
            <button type="submit" style="width: 100%; padding: 12px; background-color: #2ec4b6; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background-color 0.2s;">
                Kirish
            </button>
            
            <a href="{% url 'password_reset' %}" style="display: block; text-align: center; padding: 10px; color: #e71d36; border: 1px solid #e71d36; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s;">
                Kalit so'zni tiklash
            </a>
            
            <a href="javascript:history.back()" style="display: block; text-align: center; padding: 10px; color: #6c757d; border: 1px solid #6c757d; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s;">
                ← Orqaga qaytish
            </a>
        </div>
    </form>
</div>

<style>
    .custom-django-form p {
        margin-bottom: 14px;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    .custom-django-form input {
        padding: 10px 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
    }
    .custom-django-form input:focus {
        border-color: #2ec4b6;
    }
    /* Tugmalarga sichqoncha kelgandagi effektlar */
    button:hover { background-color: #20a498 !important; }
    a[href*='password_reset']:hover { background-color: #fff5f5; }
    a[href*='javascript']:hover { background-color: #f8f9fa; }
</style>
{% endblock content %}
