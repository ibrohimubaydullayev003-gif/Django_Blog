
{% extends 'base.html' %}

{% block title %}Kalit so'zingiz o'zgartirildi{% endblock title %}

{% block content %}

<div style="
    max-width:500px;
    margin:80px auto;
">

    <div style="
        background:#ffffff;
        border-radius:18px;
        overflow:hidden;
        box-shadow:0 10px 30px rgba(0,0,0,.08);
        text-align:center;
    ">

        <div style="
            background:linear-gradient(135deg,#16a34a,#15803d);
            padding:35px;
            color:white;
        ">
            <div style="
                font-size:60px;
                margin-bottom:10px;
            ">
                ✓
            </div>

            <h1 style="
                margin:0;
                font-size:28px;
                font-weight:700;
            ">
                Kalit so'z o'zgartirildi
            </h1>
        </div>

        <div style="padding:35px;">

            <p style="
                color:#475569;
                font-size:16px;
                line-height:1.7;
                margin-bottom:30px;
            ">
                Kalit so'zingiz muvaffaqiyatli yangilandi.
                Endi yangi kalit so'z orqali saytga kirishingiz mumkin.
            </p>

            <a href="{% url 'login' %}"
               style="
               display:inline-block;
               text-decoration:none;
               background:#2563eb;
               color:white;
               padding:12px 24px;
               border-radius:10px;
               font-weight:600;
               box-shadow:0 4px 12px rgba(37,99,235,.2);
               ">
                🔐 Tizimga kirish
            </a>

        </div>

    </div>

</div>

{% endblock content %}
