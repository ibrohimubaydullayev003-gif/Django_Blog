{% extends 'base.html' %}

{% block title %}Yangi post yaratish{% endblock title %}

{% block content %}
<div class="form-container" style="max-width: 700px; margin: 40px auto; padding: 40px 30px; background-color: #ffffff; border-radius: 16px; border: 1px solid #eaeaea; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04); font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    
    <div style="margin-bottom: 30px; border-bottom: 1px solid #f1f5f9; padding-bottom: 16px;">
        <h2 style="color: #0f172a; margin: 0 0 6px 0; font-size: 28px; font-weight: 700; letter-spacing: -0.5px;">📝 Yangi post yozish</h2>
        <p style="color: #64748b; margin: 0; font-size: 14px;">Blogingiz uchun qiziqarli va foydali maqola yarating</p>
    </div>
    
    <form method="post" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 20px;">
        {% csrf_token %}
        
        {{ form.media }}
        
        <div class="custom-post-form">
            {{ form.as_p }}
        </div>
        
        <div style="display: flex; align-items: center; justify-content: flex-end; gap: 12px; margin-top: 15px; border-top: 1px solid #f1f5f9; padding-top: 20px;">
            
            <a href="javascript:history.back()" class="btn-cancel" style="padding: 12px 24px; color: #4b5563; border: 1px solid #e5e7eb; border-radius: 8px; text-decoration: none; font-size: 15px; font-weight: 600; transition: all 0.2s ease; background-color: #f9fafb; text-align: center;">
                Bekor qilish
            </a>
            
            <button type="submit" class="btn-save" style="padding: 12px 28px; background-color: #059669; color: #ffffff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(5, 150, 105, 0.15);">
                🚀 Saqlash va chop etish
            </button>
            
        </div>
    </form>
</div>

<style>
    /* Django p teglari ichidagi maydonlarni tartiblash */
    .custom-post-form p {
        margin: 0 0 20px 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        color: #374151;
        font-size: 14px;
        font-weight: 600;
    }
    
    /* Matnli inputlar va select maydonlari stili */
    .custom-post-form input[type="text"],
    .custom-post-form select,
    .custom-post-form textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 15px;
        color: #1f2937;
        background-color: #f9fafb;
        box-sizing: border-box;
        outline: none;
        transition: all 0.2s ease;
        font-family: inherit;
    }
    
    /* Fokus holati */
    .custom-post-form input[type="text"]:focus,
    .custom-post-form select:focus,
    .custom-post-form textarea:focus {
        border-color: #2563eb;
        background-color: #ffffff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    /* Rasm yuklash (File input) maydoni moslashuvi */
    .custom-post-form input[type="file"] {
        padding: 8px 0;
        font-size: 14px;
        color: #4b5563;
    }

    /* CKEditor maydoni ota-ona blokidan chiqib ketmasligi uchun joriy etiladi */
    .django-ckeditor-widget {
        width: 100% !important;
    }
    .cke_chrome {
        border-radius: 8px !important;
        border: 1px solid #d1d5db !important;
        overflow: hidden;
    }
    
    /* Tugmalar interaktivligi (Hover effektlari) */
    .btn-save:hover {
        background-color: #047857 !important;
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(5, 150, 105, 0.25) !important;
    }
    .btn-save:active { transform: translateY(0); }
    
    .btn-cancel:hover {
        background-color: #f3f4f6 !important;
        border-color: #d1d5db !important;
        color: #1f2937 !important;
    }
</style>
{% endblock content %}
